<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lô Tô Dò Số</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>

:root {
  --bg:       #080e1c;
  --surface:  #0f1a2e;
  --card:     #131f35;
  --border:   #1e2f4a;
  --text:     #e8f0fe;
  --muted:    #4a6080;
  --top-h:    148px;  
  --tab-h:    44px;   
  --fab-s:    52px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); }

.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

#topBar {
  flex-shrink: 0;
  background: linear-gradient(180deg, #0b1525 0%, #080e1c 100%);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  z-index: 100;
}

.top-row1 {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.led-wrap {
  flex-shrink: 0;
  position: relative;
  width: 76px; height: 76px;
}
.led-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.led-track {
  fill: none; stroke: #1a2b45; stroke-width: 5;
}
.led-ring {
  fill: none; stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 213; 
  stroke-dashoffset: 213;
  transition: stroke 0.4s, stroke-dashoffset 0.5s;
}
.led-inner {
  position: absolute; inset: 8px;
  border-radius: 50%;
  background: #0b1525;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.led-number {
  font-family: 'Lilita One', cursive;
  font-size: 1.9rem; line-height: 1;
  transition: color 0.3s;
  color: #fbbf24;
}
.led-label {
  font-size: 0.45rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin-top: 1px;
}

.led-wrap.state-idle   .led-ring { stroke: #1e3a5f; }
.led-wrap.state-normal .led-ring { stroke: #fbbf24; }
.led-wrap.state-wait   .led-ring { stroke: #f97316; filter: drop-shadow(0 0 4px #f97316); }
.led-wrap.state-bingo  .led-ring { stroke: #22c55e; filter: drop-shadow(0 0 6px #22c55e); }
.led-wrap.state-normal .led-number { color: #fbbf24; }
.led-wrap.state-wait   .led-number { color: #f97316; }
.led-wrap.state-bingo  .led-number { color: #22c55e; }

.top-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.top-input-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.num-input {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 1rem;
  padding: 8px 12px;
  outline: none;
  min-width: 0;
}
.num-input:focus { border-color: #38bdf8; }
.num-input.error  { border-color: #ef4444 !important; animation: shake 0.35s ease; }
.num-input::placeholder { color: var(--muted); font-weight: 700; font-size:0.85rem; }
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-6px); }
  40%     { transform:translateX(6px); }
  60%     { transform:translateX(-4px); }
  80%     { transform:translateX(4px); }
}
#inputHint {
  font-size:0.62rem; font-weight:700; color:#ef4444;
  min-height:14px; padding:0 2px;
  transition:opacity 0.2s; opacity:0;
}
#inputHint.show { opacity:1; }

.btn-enter {
  flex-shrink: 0;
  background: #38bdf8; color: #fff;
  border: none; border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 1rem; padding: 8px 14px; cursor: pointer;
}
.btn-enter:active { transform: scale(0.92); }

.ctrl-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.ibtn {
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 0.68rem; padding: 5px 10px;
  cursor: pointer; transition: transform 0.1s;
  white-space: nowrap;
  touch-action: manipulation;
}
.ibtn:active { transform: scale(0.9); }
.ibtn-start { background: #22c55e; color: #fff; border-color: #22c55e; }
.ibtn-reset { background: transparent; color: #ef4444; border-color: #ef4444; }
.ibtn-undo  { background: transparent; color: #f97316; border-color: #f97316; }
.ibtn-mute  { background: transparent; color: var(--text); border-color: var(--border); padding: 5px 8px; font-size: 0.85rem; }
.ibtn-mute.muted { color: var(--muted); border-color: var(--muted); opacity: 0.55; }

.called-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.called-meta {
  flex-shrink: 0;
  font-size: 0.62rem;
  color: var(--muted);
  font-weight: 700;
  white-space: nowrap;
}
.called-chips {
  flex: 1;
  display: flex;
  flex-wrap: nowrap;
  gap: 3px;
  overflow: hidden;
}
.chip {
  background: #1a2b45; color: var(--text);
  border-radius: 5px; padding: 2px 6px;
  font-size: 0.68rem; font-weight: 900;
  flex-shrink: 0;
}
.chip.chip-last {
  background: #fbbf24; color: #000;
}

.game-status { font-size: 0.68rem; font-weight: 700; color: var(--muted); margin-left: auto; white-space: nowrap; }
.game-status.active { color: #22c55e; }

#colorBar {
  flex-shrink: 0;
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  background: #0c1528;
  border-bottom: 1px solid var(--border);
}
#colorBar::-webkit-scrollbar { display: none; }

.ctab {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 22px;
  
  border: 2px solid;
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 0.72rem; cursor: pointer;
  transition: transform 0.1s, background 0.15s, box-shadow 0.15s;
  white-space: nowrap;
  touch-action: manipulation;
}
.ctab:active { transform: scale(0.92); }

.ctab.active {
  box-shadow: 0 0 12px rgba(255,255,255,0.2), 0 2px 8px rgba(0,0,0,0.4);
}

.ctab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.ctab-badge {
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 1px 5px;
  font-size: 0.6rem;
  font-weight: 900;
  min-width: 18px;
  text-align: center;
  line-height: 1.5;
}
.ctab-badge.has-wait  { background: #f97316; color: #fff; }
.ctab-badge.has-bingo { background: #22c55e; color: #fff; }

#mainBody {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px 8px 80px; 
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#mainBody::-webkit-scrollbar { width: 3px; }
#mainBody::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.sheets-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  align-items: start;
}

.sheet-col { display: flex; flex-direction: column; gap: 6px; }
.sheet-label {
  font-size: 0.6rem; font-weight: 900;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; padding: 0 2px 3px;
  border-bottom: 1px solid var(--border);
}

.lcard {
  background: var(--card);
  border-radius: 10px;
  padding: 7px;
  border: 1px solid var(--border);
}
.lcard-title {
  font-size: 0.55rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.lrow {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 3px;
  margin-bottom: 3px;
  border-radius: 6px;
  padding: 2px;
  position: relative;
  transition: all 0.3s;
}
.lrow:last-child { margin-bottom: 0; }

.lrow.state-wait {
  border: 1.5px solid transparent;
  background-clip: padding-box;
  animation: neon-wait 1.4s ease-in-out infinite;
}
@keyframes neon-wait {
  0%,100% { box-shadow: 0 0 0 0 rgba(249,115,22,0), inset 0 0 0 1.5px #f97316; }
  50%     { box-shadow: 0 0 10px 2px rgba(249,115,22,0.4), inset 0 0 0 1.5px #f97316; }
}
.lrow.state-bingo {
  animation: neon-bingo 0.9s ease-in-out infinite;
}
@keyframes neon-bingo {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0), inset 0 0 0 1.5px #22c55e; }
  50%     { box-shadow: 0 0 12px 3px rgba(34,197,94,0.45), inset 0 0 0 1.5px #22c55e; }
}

.wait-label {
  position: absolute;
  top: 50%; right: -2px;
  transform: translate(100%, -50%);
  font-size: 0.52rem; font-weight: 900;
  color: #f97316; white-space: nowrap;
  pointer-events: none;
  display: none;
}

.lcell {
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 0.78rem;
  padding: 5px 1px;
  transition: background 0.2s, color 0.2s, transform 0.15s;
  min-width: 0;
}
.cc-n { background: #1a2b45; color: #6080a0; }                     
.cc-m { background: #fbbf24; color: #000; transform: scale(1.05); } 
.cc-w { background: #f97316; color: #fff; }                         
.cc-b { background: #22c55e; color: #fff; }                         

.cc-missing {
  background: #1a2b45;
  color: #f97316;
  border: 1.5px solid #f97316;
  animation: blink-missing 0.7s step-end infinite;
}
@keyframes blink-missing {
  0%,100% { opacity: 1; }
  50%     { opacity: 0.2; }
}

.color-group { margin-bottom: 14px; }
.color-group-header {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 6px; padding: 4px 6px;
  border-radius: 8px;
}
.cg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cg-name { font-family: 'Lilita One', cursive; font-size: 0.88rem; }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px; color: var(--muted);
  text-align: center; gap: 8px;
}
.empty-state .es-icon { font-size: 2.5rem; opacity: 0.4; }
.empty-state .es-text { font-size: 0.85rem; font-weight: 700; }

#fabBtn {
  position: fixed;
  bottom: 18px; right: 14px;
  z-index: 200;
  width: auto; height: var(--fab-s);
  padding: 0 18px;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  border: none; border-radius: 26px;
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 0.82rem; color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(56,189,248,0.45);
  display: flex; align-items: center; gap: 7px;
  transition: transform 0.15s, box-shadow 0.15s;
}
#fabBtn:active { transform: scale(0.92); }
#fabBtn .fab-icon { font-size: 1rem; }

#gridOverlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
}
#gridOverlay.open {
  pointer-events: all;
  opacity: 1;
}
.grid-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
}
.grid-sheet {
  position: relative;
  background: #0d1828;
  border-radius: 18px 18px 0 0;
  border-top: 1.5px solid var(--border);
  padding: 12px 10px 18px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#gridOverlay.open .grid-sheet {
  transform: translateY(0);
}
.grid-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 10px;
}
.grid-title {
  font-size: 0.62rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  text-align: center; margin-bottom: 8px;
}
.num-grid {
  display: grid;
  grid-template-columns: repeat(10,1fr);
  gap: 4px;
}
.num-btn {
  aspect-ratio: 1;
  border-radius: 7px;
  border: 1px solid var(--border);
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: 0.72rem;
  cursor: pointer;
  background: #1a2b45; color: var(--text);
  transition: background 0.12s;
  touch-action: manipulation;
}
.num-btn:active { transform: scale(0.85); }
.num-btn.called { background: #38bdf8; color: #fff; border-color: #38bdf8; }

.num-btn.called::after {
  content: '×';
  position: absolute;
  top: -4px; right: -3px;
  width: 13px; height: 13px;
  background: #ef4444;
  border-radius: 50%;
  font-size: 0.6rem; line-height: 13px;
  text-align: center;
  display: none;
}
.num-btn { position: relative; }
.num-btn.called:active::after { display: block; }

.grid-hint {
  font-size: 0.6rem; color: var(--muted);
  text-align: center; margin-bottom: 6px;
  font-weight: 700;
}

.popup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 998;
}
.popup-overlay.show { display: block; }
.popup-banner {
  display: none; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%); z-index: 999;
  border-radius: 20px; padding: 22px 28px; text-align: center;
  font-family: 'Lilita One', cursive; font-size: 1.85rem;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  min-width: 200px; white-space: pre-line; line-height: 1.35;
  animation: pop-in 0.3s ease;
}
.popup-banner.show { display: block; }
.pb-wait  { background: #f97316; color: #fff; }
.pb-bingo { background: #22c55e; color: #fff; }
@keyframes pop-in {
  0%  { transform:translate(-50%,-50%) scale(0.4); opacity:0; }
  80% { transform:translate(-50%,-50%) scale(1.08); }
  100%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
}
</style>
</head>

<div class="app">

  <!-- ═══════════════════════════════
       TẦNG THƯỢNG
  ═══════════════════════════════ -->
  <div id="topBar">
    <div class="top-row1">

      <!-- LED Circle -->
      <div class="led-wrap state-idle" id="ledWrap">
        <svg class="led-svg" viewBox="0 0 76 76">
          <circle class="led-track" cx="38" cy="38" r="34"/>
          <circle class="led-ring"  cx="38" cy="38" r="34" id="ledRing"/>
        </svg>
        <div class="led-inner">
          <div class="led-number" id="ledNumber">—</div>
          <div class="led-label">SỐ GỌI</div>
        </div>
      </div>

      <!-- Right panel -->
      <div class="top-right">
        <div class="top-input-row" id="inputRow" style="display:none">
          <div style="flex:1;display:flex;flex-direction:column;gap:2px;min-width:0">
            <div style="display:flex;gap:6px">
              <input class="num-input" type="number" id="numInput" min="1" max="90"
                     placeholder="Nhập số 1–90" inputmode="numeric">
              <button class="btn-enter" id="btnEnter">✔</button>
            </div>
            <div id="inputHint"></div>
          </div>
        </div>
        <div class="ctrl-row">
          <button class="ibtn ibtn-start" id="btnStart">▶ Bắt đầu</button>
          <button class="ibtn ibtn-reset" id="btnReset">↺ Reset</button>
          <button class="ibtn ibtn-undo"  id="btnUndo">✕ Hủy số cuối</button>
          <button class="ibtn ibtn-mute"  id="btnMute" title="Bật/tắt âm thanh">🔊</button>
        </div>
        <div class="called-row" id="calledRow">
          <span class="called-meta">ĐÃ GỌI <span id="calledCount">0</span></span>
          <div class="called-chips" id="calledChips"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════
       TẦNG GIỮA — Color tabs
  ═══════════════════════════════ -->
  <div id="colorBar" style="display:none">
    <!-- built by JS -->
  </div>

  <!-- ═══════════════════════════════
       TẦNG CHÍNH — Cards
  ═══════════════════════════════ -->
  <div id="mainBody">
    <div class="empty-state">
      <div class="es-icon">🎴</div>
      <div class="es-text">Nhấn "Bắt đầu" để bắt đầu dò số</div>
    </div>
  </div>

</div><!-- .app -->

<!-- FAB -->
<button id="fabBtn" style="display:none">
  <span class="fab-icon">⊞</span> Chọn nhanh
</button>

<!-- Num-grid overlay -->
<div id="gridOverlay">
  <div class="grid-backdrop" id="gridBackdrop"></div>
  <div class="grid-sheet">
    <div class="grid-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 4px 2px">
      <div class="grid-title" style="margin:0">Chọn nhanh số (1–90)</div>
      <button onclick="closeGrid()" style="background:#1e2f4a;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:0.75rem;font-weight:900;padding:4px 10px;cursor:pointer;touch-action:manipulation;flex-shrink:0">✕ Đóng</button>
    </div>
    <div class="grid-hint">Tap 2 lần số đã gọi <span style="color:#ef4444">⟳</span> để hủy</div>
    <div class="num-grid" id="numGrid"></div>
  </div>
</div>

<!-- Alert -->
<div class="popup-overlay" id="popOverlay" onclick="closeAlert()"></div>
<div class="popup-banner"  id="popBanner"  onclick="closeAlert()"></div>

let called      = [];
let started     = false;
let activeColor = 'all';
let alertTimer  = null;
const rowState  = {};  
const waitMap   = {};  

const RING_FULL = 213.63; 
function setLED(num, state) {
  const wrap = document.getElementById('ledWrap');
  const ring = document.getElementById('ledRing');
  const txt  = document.getElementById('ledNumber');
  wrap.className = `led-wrap state-${state}`;
  txt.textContent = num ?? '—';
  
  const pct = called.length / 90;
  ring.style.strokeDashoffset = RING_FULL * (1 - pct);
}

function getBadgeCounts() {
  const counts = {};
  COLORS.forEach(c => { counts[c.key] = { wait:0, bingo:0 }; });
  let allWait = 0, allBingo = 0;
  Object.entries(rowState).forEach(([key, state]) => {
    const colorKey = key.split('_')[0];
    if (state === 'wait')  { counts[colorKey].wait++;  allWait++;  }
    if (state === 'bingo') { counts[colorKey].bingo++; allBingo++; }
  });
  return { perColor: counts, allWait, allBingo };
}

function buildColorTabs() {
  const bar = document.getElementById('colorBar');
  bar.innerHTML = '';

  const all = makeTab('all', '🎴', '#94a3b8', 'Tất cả');
  bar.appendChild(all);

  COLORS.forEach(c => {
    bar.appendChild(makeTab(c.key, null, c.color, c.name));
  });
}

function makeTab(key, icon, color, name) {
  const b = document.createElement('button');
  
  b.className = 'ctab' + (key === activeColor ? ' active' : '');
  b.dataset.key  = key;
  b.dataset.color = color;

  applyTabStyle(b, key === activeColor, color);

  const dot = icon
    ? `<span style="font-size:0.85rem">${icon}</span>`
    : `<div class="ctab-dot" style="background:${color}"></div>`;
  b.innerHTML = `${dot}<span>${name}</span><span class="ctab-badge" id="badge_${key}">0</span>`;
  b.onclick = () => setActiveColor(key);
  return b;
}

function applyTabStyle(btn, isActive, color) {
  if (isActive) {
    btn.style.background   = color;
    btn.style.borderColor  = color;
    btn.style.color        = '#fff';
  } else {
    
    btn.style.background   = color + '22';
    btn.style.borderColor  = color + 'aa';
    btn.style.color        = color;
  }
}

function refreshBadges() {
  const { perColor, allWait, allBingo } = getBadgeCounts();
  
  const allB = document.getElementById('badge_all');
  if (allB) {
    const total = allWait + allBingo;
    allB.textContent = total;
    allB.className = 'ctab-badge' + (allBingo > 0 ? ' has-bingo' : allWait > 0 ? ' has-wait' : '');
  }
  COLORS.forEach(c => {
    const b = document.getElementById(`badge_${c.key}`);
    if (!b) return;
    const { wait, bingo } = perColor[c.key];
    const total = wait + bingo;
    b.textContent = total;
    b.className = 'ctab-badge' + (bingo > 0 ? ' has-bingo' : wait > 0 ? ' has-wait' : '');
  });
}

function setActiveColor(key) {
  activeColor = key;
  document.querySelectorAll('.ctab').forEach(t => {
    const isActive = t.dataset.key === key;
    t.classList.toggle('active', isActive);
    applyTabStyle(t, isActive, t.dataset.color);
  });
  renderMain();
  document.getElementById('mainBody').scrollTop = 0;
}

function renderMain() {
  const body = document.getElementById('mainBody');
  body.innerHTML = '';

  const colorsToShow = activeColor === 'all' ? COLORS : COLORS.filter(c => c.key === activeColor);

  colorsToShow.forEach(color => {
    const group = document.createElement('div');
    group.className = 'color-group';
    group.dataset.colorKey = color.key;

    
    if (activeColor === 'all') {
      group.innerHTML = `<div class="color-group-header" style="background:${color.color}18">
        <div class="cg-dot" style="background:${color.color}"></div>
        <span class="cg-name" style="color:${color.color}">${color.name}</span>
      </div>`;
    }

    
    const row = document.createElement('div');
    row.className = 'sheets-row';

    color.sheets.forEach(sheet => {
      const col = document.createElement('div');
      col.className = 'sheet-col';
      col.innerHTML = `<div class="sheet-label">${sheet.name}</div>`;
      sheet.cards.forEach(card => {
        col.appendChild(buildCard(color, card));
      });
      row.appendChild(col);
    });

    group.appendChild(row);
    body.appendChild(group);
  });
}

function buildCard(color, card) {
  const el = document.createElement('div');
  el.className = 'lcard';
  let h = `<div class="lcard-title" style="color:${color.color}88">${card.id}</div>`;
  card.rows.forEach((row, ri) => {
    const key = `${color.key}_${card.id}_${ri}`;
    const m   = row.filter(n => called.includes(n)).length;
    const st  = rowState[key];
    const missing = waitMap[key];
    const rowCls = st === 'bingo' ? ' state-bingo' : st === 'wait' ? ' state-wait' : '';
    h += `<div class="lrow${rowCls}" id="lr_${color.key}_${card.id}_${ri}">`;
    row.forEach((n, ni) => {
      const isMissing = (st === 'wait' && n === missing);
      let cls = cellCls(n, m, isMissing);
      h += `<div class="lcell ${cls}" id="lc_${color.key}_${card.id}_${ri}_${ni}">${n}</div>`;
    });
    h += '</div>';
  });
  el.innerHTML = h;
  return el;
}

function cellCls(n, rowMatched, isMissing) {
  if (isMissing) return 'cc-missing';
  if (!called.includes(n)) return 'cc-n';
  if (rowMatched === 5) return 'cc-b';
  if (rowMatched === 4) return 'cc-w';
  return 'cc-m';
}

function syncCells() {
  COLORS.forEach(color => {
    color.sheets.forEach(sheet => {
      sheet.cards.forEach(card => {
        card.rows.forEach((row, ri) => {
          const key  = `${color.key}_${card.id}_${ri}`;
          const m    = row.filter(n => called.includes(n)).length;
          const st   = rowState[key];
          const miss = waitMap[key];
          const rowEl = document.getElementById(`lr_${color.key}_${card.id}_${ri}`);
          if (!rowEl) return;
          rowEl.className = 'lrow' + (st === 'bingo' ? ' state-bingo' : st === 'wait' ? ' state-wait' : '');
          row.forEach((n, ni) => {
            const cell = document.getElementById(`lc_${color.key}_${card.id}_${ri}_${ni}`);
            if (cell) cell.className = `lcell ${cellCls(n, m, st === 'wait' && n === miss)}`;
          });
        });
      });
    });
  });
}

function callNumber(n) {
  if (!started) return;
  if (called.includes(n)) { showInputHint(`Số ${n} đã được gọi rồi`); SFX.invalid(); return; }
  called.push(n);
  checkRows();
  const newState = (() => {
    let s = 'normal';
    COLORS.forEach(color => color.sheets.forEach(sheet => sheet.cards.forEach(card => card.rows.forEach((row, ri) => {
      if (!row.includes(n)) return;
      const key = `${color.key}_${card.id}_${ri}`;
      if (rowState[key] === 'bingo') s = 'bingo';
      else if (rowState[key] === 'wait' && s !== 'bingo') s = 'wait';
    }))));
    return s;
  })();
  if (newState === 'bingo') SFX.bingo();
  else if (newState === 'wait') SFX.wait();
  else SFX.call();
  updateTopBar(n);
  syncCells();
  refreshBadges();
  updatePicker();
  saveState();
}

function updateTopBar(last) {
  
  let ledState = 'normal';
  
  COLORS.forEach(color => {
    color.sheets.forEach(sheet => {
      sheet.cards.forEach(card => {
        card.rows.forEach((row, ri) => {
          if (!row.includes(last)) return;
          const key = `${color.key}_${card.id}_${ri}`;
          if (rowState[key] === 'bingo') ledState = 'bingo';
          else if (rowState[key] === 'wait' && ledState !== 'bingo') ledState = 'wait';
        });
      });
    });
  });
  setLED(last, ledState);

  document.getElementById('calledCount').textContent = called.length;
  
  const chips = document.getElementById('calledChips');
  chips.innerHTML = [...called].reverse().slice(0, 10)
    .map((n, i) => `<span class="chip${i === 0 ? ' chip-last' : ''}">${n}</span>`).join('');
}

function checkRows() {
  let topBingo = null, topWait = null;
  COLORS.forEach(color => {
    color.sheets.forEach(sheet => {
      sheet.cards.forEach(card => {
        card.rows.forEach((row, ri) => {
          const key = `${color.key}_${card.id}_${ri}`;
          const m   = row.filter(n => called.includes(n)).length;
          if (m === 5 && rowState[key] !== 'bingo') {
            rowState[key] = 'bingo';
            delete waitMap[key];
            if (!topBingo) topBingo = { color, sheet, card, ri };
          } else if (m === 4 && !rowState[key]) {
            rowState[key] = 'wait';
            waitMap[key]  = row.find(n => !called.includes(n));
            if (!topWait) topWait = { color, sheet, card, ri };
          }
        });
      });
    });
  });
  if (topBingo) {
    const { color, sheet, card, ri } = topBingo;
    showAlert(`🎉 KINH!\n${color.name}\n${sheet.name} · ${card.id}\nHàng ${ri+1}`, 'pb-bingo');
  } else if (topWait) {
    const { color, sheet, card, ri } = topWait;
    const miss = waitMap[`${color.key}_${card.id}_${ri}`];
    showAlert(`⚡ ĐỢI ${miss}!\n${color.name}\n${sheet.name} · ${card.id}\nHàng ${ri+1}`, 'pb-wait');
  }
}

function updatePicker() {
  for (let i = 1; i <= 90; i++) {
    const b = document.getElementById('nb_' + i);
    if (b) b.className = called.includes(i) ? 'num-btn called' : 'num-btn';

  const el = document.getElementById('inputHint');
  const inp = document.getElementById('numInput');
  el.classList.remove('show');
  inp.classList.remove('error');
  clearTimeout(hintTimer);
}

function tryCallFromInput() {
  const inp = document.getElementById('numInput');
  const raw = inp.value.trim();
  if (!raw) return;
  const v = parseInt(raw);
  if (isNaN(v) || v < 1 || v > 90) {
    showInputHint(`"${raw}" không hợp lệ — chỉ nhận 1 đến 90`);
    return;
  }
  if (called.includes(v)) {
    showInputHint(`Số ${v} đã được gọi rồi`);
    return;
  }
  clearInputHint();
  callNumber(v);
  inp.value = '';
  inp.focus();
}

const LS_KEY = 'loto_save_v1';

function saveState() {
  if (!started) return;
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      called,
      activeColor,
      rowState: { ...rowState },
      waitMap:  { ...waitMap },
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (!s.called || !s.called.length) return false;

    
    called = s.called;
    activeColor = s.activeColor || 'all';
    Object.assign(rowState, s.rowState || {});
    Object.assign(waitMap,  s.waitMap  || {});

    
    started = true;
    document.getElementById('inputRow').style.display = 'flex';
    document.getElementById('colorBar').style.display = 'flex';
    document.getElementById('fabBtn').style.display = 'flex';
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStart').style.opacity = '0.45';

    buildColorTabs();
    renderMain();
    refreshBadges();
    syncCells();
    updatePicker();

    const last = called[called.length - 1];
    setLED(last, 'normal');
    document.getElementById('calledCount').textContent = called.length;
    document.getElementById('calledChips').innerHTML = [...called].reverse().slice(0,10)
      .map((n,i) => `<span class="chip${i===0?' chip-last':''}">${n}</span>`).join('');

    return true;
  } catch(e) {
    localStorage.removeItem(LS_KEY);
    return false;
  }
}

function clearSave() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

const _lastTap = {};
function buildPicker() {
  const grid = document.getElementById('numGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 90; i++) {
    const b = document.createElement('button');
    b.id = 'nb_' + i;
    b.textContent = i;
    b.className = called.includes(i) ? 'num-btn called' : 'num-btn';
    b.onclick = () => {
      if (!started) return;
      if (called.includes(i)) {
        const now = Date.now();
        const prev = _lastTap[i] || 0;
        if (now - prev < 420) {
          delete _lastTap[i];
          removeNumber(i);
        } else {
          _lastTap[i] = now;
          flashBtn(b);
        }
      } else {
        callNumber(i);
      }
    };
    grid.appendChild(b);
  }
}

function flashBtn(btn) {
  btn.style.outline = '2px solid #ef4444';
  btn.style.outlineOffset = '1px';
  setTimeout(() => { btn.style.outline = ''; btn.style.outlineOffset = ''; }, 400);
}

function removeNumber(n) {
  const idx = called.indexOf(n);
  if (idx === -1) return;
  called.splice(idx, 1);

  
  Object.keys(rowState).forEach(k => delete rowState[k]);
  Object.keys(waitMap).forEach(k  => delete waitMap[k]);
  COLORS.forEach(color => {
    color.sheets.forEach(sheet => {
      sheet.cards.forEach(card => {
        card.rows.forEach((row, ri) => {
          const key = `${color.key}_${card.id}_${ri}`;
          const m   = row.filter(x => called.includes(x)).length;
          if (m === 5) {
            rowState[key] = 'bingo';
          } else if (m === 4) {
            rowState[key] = 'wait';
            waitMap[key]  = row.find(x => !called.includes(x));
          }
        });
      });
    });
  });

  const prev = called.length ? called[called.length-1] : null;
  setLED(prev, prev ? 'normal' : 'idle');
  document.getElementById('calledCount').textContent = called.length;
  document.getElementById('calledChips').innerHTML = [...called].reverse().slice(0,10)
    .map((x,i) => `<span class="chip${i===0?' chip-last':''}">${x}</span>`).join('');
  syncCells();
  refreshBadges();
  updatePicker();
  saveState();
  SFX.undo();
  showAlert(`Đã hủy\nsố ${n}`, 'pb-wait');
}

function updatePicker() {
  for (let i = 1; i <= 90; i++) {
    const b = document.getElementById('nb_' + i);
    if (!b) continue;
    b.className = called.includes(i) ? 'num-btn called' : 'num-btn';
    b.title     = called.includes(i) ? `Tap để hủy số ${i}` : '';
  }
}

let audioCtx = null;
let audioMuted = localStorage.getItem('loto_mute') === '1';

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone({ freq = 440, type = 'sine', duration = 0.12, gain = 0.35, delay = 0, decay = true }) {
  if (audioMuted) return;
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    env.gain.setValueAtTime(0, ctx.currentTime + delay);
    env.gain.linearRampToValueAtTime(gain, ctx.currentTime + delay + 0.01);
    if (decay) {
      env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    } else {
      env.gain.setValueAtTime(gain, ctx.currentTime + delay + duration - 0.02);
      env.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + duration);
    }
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration + 0.02);
  } catch(e) {}
}

function playGlide({ freqStart, freqEnd, type = 'sine', duration = 0.2, gain = 0.3, delay = 0 }) {
  if (audioMuted) return;
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freqStart, ctx.currentTime + delay);
    osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + delay + duration);
    env.gain.setValueAtTime(gain, ctx.currentTime + delay);
    env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration + 0.02);
  } catch(e) {}
}

function playNoise({ duration = 0.04, gain = 0.15, delay = 0 }) {
  if (audioMuted) return;
  try {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    const env = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    src.buffer = buf;
    filt.type = 'bandpass';
    filt.frequency.value = 1200;
    filt.Q.value = 0.8;
    src.connect(filt);
    filt.connect(env);
    env.connect(ctx.destination);
    env.gain.setValueAtTime(gain, ctx.currentTime + delay);
    env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    src.start(ctx.currentTime + delay);
  } catch(e) {}
}

const SFX = {
  call() {
    playNoise({ duration: 0.03, gain: 0.18 });
    playTone({ freq: 880, type: 'triangle', duration: 0.07, gain: 0.18 });
  },
  wait() {
    const notes = [330, 415, 494];
    notes.forEach((f, i) => playTone({ freq: f, type: 'sine', duration: 0.18, gain: 0.28, delay: i * 0.1 }));
  },
  bingo() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => playTone({ freq: f, type: 'triangle', duration: 0.22, gain: 0.32, delay: i * 0.1 }));
    playTone({ freq: 1047, type: 'sine', duration: 0.55, gain: 0.2, delay: 0.42 });
  },
  undo() {
    playGlide({ freqStart: 440, freqEnd: 180, type: 'triangle', duration: 0.22, gain: 0.28 });
  },
  start() {
    playTone({ freq: 523, type: 'sine', duration: 0.14, gain: 0.22 });
    playTone({ freq: 784, type: 'sine', duration: 0.2,  gain: 0.22, delay: 0.12 });
  },
  invalid() {
    playTone({ freq: 220, type: 'square', duration: 0.08, gain: 0.12 });
    playTone({ freq: 180, type: 'square', duration: 0.1,  gain: 0.12, delay: 0.09 });
  },
};

function updateMuteBtn() {
  const btn = document.getElementById('btnMute');
  btn.textContent = audioMuted ? '🔇' : '🔊';
  btn.classList.toggle('muted', audioMuted);
  btn.title = audioMuted ? 'Bật âm thanh' : 'Tắt âm thanh';
}

document.getElementById('btnMute').onclick = () => {
  audioMuted = !audioMuted;
  localStorage.setItem('loto_mute', audioMuted ? '1' : '0');
  updateMuteBtn();
  if (!audioMuted) SFX.start();
};

updateMuteBtn();

buildPicker();

loadState();

</script>
